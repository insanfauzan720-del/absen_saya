<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Absensi - SiAbsen</title>
    <meta name="description" content="Input Absensi Harian SiAbsen">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="brand">SiAbsen</a>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="murid.html">Data Murid</a>
            <a href="absensi.html" class="active">Input Absensi</a>
            <a href="laporan.html">Laporan</a>
        </div>
    </nav>

    <div class="container">
        <h1>Input Absensi Harian</h1>

        <div class="card mb-3">
            <div class="grid-2 align-center">
                <div>
                    <label for="tanggal">Tanggal Absensi</label>
                    <input type="date" id="tanggal" required>
                </div>
                <div>
                    <label for="kelas">Pilih Kelas</label>
                    <select id="kelas" onchange="AbsensiApp.loadMurid()">
                        <option value="">-- Pilih Kelas --</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card" id="formContainer" style="display: none;">
            <div class="flex justify-between align-center mb-3">
                <h3 id="classTitle">Daftar Murid</h3>
                <div>
                    <button class="btn btn-sm btn-success" onclick="AbsensiApp.setAll('H')">Set Semua Hadir</button>
                </div>
            </div>
            
            <form id="absensiForm" onsubmit="AbsensiApp.saveAbsensi(event)">
                <div class="table-responsive">
                    <table id="absensiTable">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>NIS</th>
                                <th>Nama</th>
                                <th style="width: 250px;">Status Kehadiran</th>
                                <th>Keterangan</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Generated by JS -->
                        </tbody>
                    </table>
                </div>
                
                <div class="mt-3 text-center">
                    <button type="submit" class="btn btn-primary btn-block">Simpan Absensi</button>
                </div>
            </form>
        </div>
        
        <div id="emptyState" class="card text-center" style="display: none;">
            <p>Silakan pilih kelas terlebih dahulu.</p>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/absensi.js"></script>
</body>
</html>
