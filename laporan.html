<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Absensi - SiAbsen</title>
    <meta name="description" content="Laporan dan Rekap Absensi Bulanan">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/print.css" media="print">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="brand">SiAbsen</a>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="murid.html">Data Murid</a>
            <a href="absensi.html">Input Absensi</a>
            <a href="laporan.html" class="active">Laporan</a>
        </div>
    </nav>

    <div class="container">
        <div class="flex justify-between align-center mb-3 no-print">
            <h1>Rekap Absensi Bulanan</h1>
            <div class="flex gap-2">
                <button class="btn btn-success" onclick="LaporanApp.exportCSV()">Export CSV</button>
                <button class="btn btn-primary" onclick="window.print()">Cetak Laporan</button>
            </div>
        </div>

        <div class="card mb-3 no-print">
            <div class="grid-3 align-center">
                <div>
                    <label for="bulan">Bulan</label>
                    <select id="bulan" onchange="LaporanApp.generateReport()">
                        <option value="1">Januari</option>
                        <option value="2">Februari</option>
                        <option value="3">Maret</option>
                        <option value="4">April</option>
                        <option value="5">Mei</option>
                        <option value="6">Juni</option>
                        <option value="7">Juli</option>
                        <option value="8">Agustus</option>
                        <option value="9">September</option>
                        <option value="10">Oktober</option>
                        <option value="11">November</option>
                        <option value="12">Desember</option>
                    </select>
                </div>
                <div>
                    <label for="tahun">Tahun</label>
                    <select id="tahun" onchange="LaporanApp.generateReport()"></select>
                </div>
                <div>
                    <label for="kelas">Kelas</label>
                    <select id="kelas" onchange="LaporanApp.generateReport()">
                        <option value="">Semua Kelas</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card" id="reportCard">
            <div style="display: none;" class="print-only">
                <h2 style="text-align: center; margin-bottom: 20px;">Laporan Rekap Absensi Sekolah</h2>
                <p style="text-align: center;" id="printPeriod"></p>
            </div>
            
            <div class="table-responsive">
                <table id="reportTable">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>NIS</th>
                            <th>Nama</th>
                            <th>Kelas</th>
                            <th class="text-center">Hadir</th>
                            <th class="text-center">Sakit</th>
                            <th class="text-center">Izin</th>
                            <th class="text-center">Alpha</th>
                            <th class="text-center">% Kehadiran</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Generated by JS -->
                    </tbody>
                </table>
            </div>
            <div id="emptyReport" class="text-center mt-3" style="display: none; color: var(--text-muted);">
                Tidak ada data absensi untuk periode ini.
            </div>
        </div>
    </div>

    <!-- Inject Print CSS behavior manually since print.css is loaded via media="print" -->
    <style>
        @media print {
            .print-only { display: block !important; }
        }
    </style>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/laporan.js"></script>
</body>
</html>
